version: '3.8'

services:
  app:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-base-ecommerce}
    restart: unless-stopped
    ports:
      - "${PORT:-3002}:${PORT:-3002}"
    volumes:
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads
      - ./public/products:/app/public/products
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3002}
      - SESSION_SECRET=${SESSION_SECRET}
      - STORE_NAME=${STORE_NAME}
      - STORE_WHATSAPP=${STORE_WHATSAPP}
      - STORE_PIX_KEY=${STORE_PIX_KEY}
      - DB_PATH=/app/data/store.db
    networks:
      - ecommerce-net

networks:
  ecommerce-net:
    driver: bridge
