# ============================================================
# loja.conf — Nginx para o e-commerce
# 
# Como usar:
#   sudo cp loja.conf /etc/nginx/sites-available/loja.conf
#   sudo sed -i 's/{{DOMAIN}}/seudominio.com.br/g' /etc/nginx/sites-available/loja.conf
#   sudo sed -i 's/{{PORT}}/3002/g' /etc/nginx/sites-available/loja.conf
#   sudo ln -s /etc/nginx/sites-available/loja.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

server {
    listen 80;
    server_name {{DOMAIN}};

    # Tamanho máximo de upload (imagens)
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/loja_access.log;
    error_log  /var/log/nginx/loja_error.log;

    # Bloquear acesso direto ao banco de dados e pasta data
    location ~ ^/data {
        deny all;
        return 404;
    }

    # Bloquear .env e arquivos sensíveis
    location ~ /\. {
        deny all;
        return 404;
    }

    # Cache para assets estáticos
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2)$ {
        proxy_pass http://localhost:{{PORT}};
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy principal para o Node.js
    location / {
        proxy_pass http://localhost:{{PORT}};
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

