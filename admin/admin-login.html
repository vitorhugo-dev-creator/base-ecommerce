<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Login</title>
  <link rel="stylesheet" href="/admin-assets/css/login.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-logo">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>

    <div class="login-card">
      <div class="login-header">
        <h1 class="login-title">Painel Administrativo</h1>
        <p class="login-subtitle">Acesso restrito — identifique-se</p>
      </div>

      <div class="login-form">
        <div class="form-group">
          <label for="username">Usuário</label>
          <div class="input-wrap">
            <input type="text" id="username" placeholder="admin" autocomplete="username">
            <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            <svg class="input-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
        </div>

        <div class="error-msg" id="error-msg">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Usuário ou senha inválidos.
        </div>

        <button class="btn-login" onclick="doLogin()">Entrar</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error-msg');
      errorEl.classList.remove('visible');

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) window.location.href = '/admin';
        else errorEl.classList.add('visible');
      } catch {
        errorEl.textContent = 'Erro de conexão. Tente novamente.';
        errorEl.classList.add('visible');
      }
    }
  </script>
</body>
</html>
